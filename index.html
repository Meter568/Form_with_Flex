<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Flex</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head> 
<body>
    <form>
        <div class="header">
            <h1>Create an account</h1>
            <p>We always keep your name and email address private</p>
        </div>
        <div class="inputs">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
            <input type="text" placeholder="Display Name">
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Password Confirmation">
        </div>
        <div class="radios">
            <div>
                <input type="radio" name="person" id="buyer">
                <label for="buyer">
                    <span>Join As a Buyer</span>
                    <span>I am looking for a Name, Logo or Tagline for my bussiness, brand or product.</span>
                </label>
            </div>
            <div>
                <input type="radio" name="person" id="cr">
                <label for="cr">
                    <span>Jion As a Creative or Marketplace Seller</span>
                    <span>I plan to submit name ideas, Logo designs or sell names in Domain Marketplace.</span>
                </label>
            </div>
        </div>
        <div class="checkbox">
            <input type="checkbox" id="chb">
            <label for="chb">Allow Squadhelp to send marketing/promotional from time to time</label>
        </div>
        <input type="submit" value="Create account" class="btn">
    </form>
</body>
</html>
